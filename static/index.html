<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault - Premium YouTube Downloader</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>StreamVault</h1>
            <p class="subtitle">Convert & download YouTube videos instantly in premium quality</p>
        </header>

        <main>
            <!-- Search Section -->
            <section class="glass-card">
                <form class="search-form" id="search-form" onsubmit="event.preventDefault();">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="youtube-url" 
                            class="search-input" 
                            placeholder="Paste your YouTube video link here..." 
                            required
                            autocomplete="off"
                        >
                    </div>
                    <button type="submit" id="btn-fetch" class="btn-fetch">
                        <span class="spinner" id="fetch-spinner"></span>
                        <span id="btn-text">Analyze Link</span>
                    </button>
                </form>
                <div class="error-alert" id="error-alert"></div>
            </section>

            <!-- Video Info & Download Section -->
            <section class="glass-card" id="video-details-container">
                <div class="video-info-wrapper">
                    <div class="thumbnail-container">
                        <img id="video-thumbnail" src="" alt="Video Thumbnail">
                        <span class="duration-badge" id="video-duration">0:00</span>
                    </div>
                    <div class="meta-content">
                        <h2 class="video-title" id="video-title">Video Title</h2>
                        <div class="channel-name">
                            <svg class="channel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                            <span id="video-uploader">Channel Name</span>
                        </div>
                        <div class="stats-grid">
                            <span id="video-views">0 views</span>
                        </div>
                    </div>
                </div>

                <div class="tabs-container">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('combined')">Video + Audio</button>
                        <button class="tab-btn" onclick="switchTab('video_only')">Video Only</button>
                        <button class="tab-btn" onclick="switchTab('audio_only')">Audio Only</button>
                    </div>

                    <!-- Video + Audio Tab -->
                    <div class="tab-panel active" id="tab-combined">
                        <div class="formats-grid" id="combined-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Video Only Tab -->
                    <div class="tab-panel" id="tab-video_only">
                        <div class="formats-grid" id="video_only-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Audio Only Tab -->
                    <div class="tab-panel" id="tab-audio_only">
                        <div class="formats-grid" id="audio_only-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Download Process -->
    <div class="modal-overlay" id="download-modal">
        <div class="modal-content">
            <h3 class="progress-title">Downloading Video</h3>
            <p class="progress-subtitle">Please keep this window open while we process your file.</p>
            
            <div class="progress-loader">
                <div class="progress-loader-circle"></div>
                <div class="progress-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                </div>
            </div>

            <div class="progress-status-container">
                <span class="status-text" id="status-text">Connecting to server...</span>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
